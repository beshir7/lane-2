name: Deploy

# Continuous deployment to Vercel on pushes to main.
#
# This job is OPT-IN so the workflow never fails before it is configured:
#   1. Create a repository variable `ENABLE_DEPLOY` = `true`
#      (Settings → Secrets and variables → Actions → Variables).
#   2. Add the secrets `VERCEL_TOKEN`, `VERCEL_ORG_ID`, `VERCEL_PROJECT_ID`
#      (from `vercel link` → `.vercel/project.json`, and a token from
#      https://vercel.com/account/tokens).
# Until `ENABLE_DEPLOY` is set, the job is skipped.

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Vercel (production)
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_DEPLOY == 'true' }}
    environment:
      name: production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
